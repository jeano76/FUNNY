<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MBTI 테스트 진행 중 | MBTI 동물 테스트</title>
  <meta name="description" content="20가지 일상 상황으로 알아보는 나의 MBTI. 지금 바로 테스트를 시작해보세요!" />
  <meta name="robots" content="noindex" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet" />

  <!-- GA_CODE_HERE -->
  <!-- ADSENSE_CODE_HERE -->

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">🐾 MBTI 동물 테스트</a>
      <ul class="nav-links">
        <li><a href="index.html">홈</a></li>
        <li><a href="quiz.html" class="active">테스트</a></li>
        <li><a href="about.html">소개</a></li>
      </ul>
    </div>
  </nav>

  <!-- Quiz Container -->
  <main class="quiz-main">
    <div class="quiz-container">

      <!-- Progress -->
      <div class="quiz-progress">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 5%"></div>
        </div>
        <span class="progress-text" id="progressText">1 / 20</span>
      </div>

      <!-- Ad Slot (mid quiz) -->
      <div class="ad-container ad-quiz-top">
        <!-- ADSENSE_UNIT: quiz-top | responsive -->
      </div>

      <!-- Question Card -->
      <div class="question-card" id="questionCard">
        <div class="question-emoji" id="questionEmoji">🛒</div>
        <h2 class="question-text" id="questionText">로딩 중...</h2>
        <div class="options-grid" id="optionsGrid">
          <!-- options injected by JS -->
        </div>
      </div>

      <!-- Navigation Buttons -->
      <div class="quiz-nav">
        <button class="btn-prev" id="prevBtn" onclick="prevQuestion()" style="visibility:hidden;">← 이전</button>
        <span class="question-count" id="questionCount">1 / 20</span>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 MBTI 동물 테스트. All rights reserved.</p>
      <nav class="footer-nav">
        <a href="about.html">사이트 소개</a>
        <a href="privacy.html">개인정보 처리방침</a>
      </nav>
    </div>
  </footer>

  <script src="js/quiz.js"></script>
  <script src="js/storage.js"></script>
</body>
</html>
